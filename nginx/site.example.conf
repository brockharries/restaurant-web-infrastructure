# Sanitized reverse-proxy vhost for the origin.
#
# Public TLS is terminated at the CDN/edge. This origin listens on 443 with an
# origin certificate (edge <-> origin leg), and in production the host firewall
# additionally restricts 443 to the edge provider's published IP ranges, so the
# box is not directly reachable from the open internet.
#
# All hostnames are placeholders.

# Basic rate limiting zone: smooths bursts / crude abuse before they hit the app.
# Depends on real-IP restoration (set_real_ip_from below): without it,
# $binary_remote_addr is the edge's IP and the zone would throttle the whole
# CDN, not individual clients.
limit_req_zone $binary_remote_addr zone=perip:10m rate=20r/s;

server {
    listen 443 ssl;
    http2 on;
    server_name example.com www.example.com;

    ssl_certificate     /etc/nginx/certs/origin.crt;   # gitignored
    ssl_certificate_key /etc/nginx/certs/origin.key;   # gitignored
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Sane limits (protect the origin) ---
    client_max_body_size 16m;      # menu images / uploads, not unbounded
    limit_req zone=perip burst=40 nodelay;

    # Trust the real client IP forwarded by the edge. real_ip_header is inert
    # until set_real_ip_from names the trusted proxies, so in production list
    # the edge provider's ranges here. Populate from the provider's published
    # IP list and keep it updated when the list changes.
    # set_real_ip_from 203.0.113.0/24;   # edge provider range (example)
    # set_real_ip_from 2001:db8::/32;    # edge provider range (example)
    real_ip_header X-Forwarded-For;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;   # ordering endpoints should be fast; fail loud, not hang
    }

    # Health endpoint the external uptime monitor probes.
    location = /healthz {
        access_log off;
        proxy_pass http://app:8080/healthz;
    }
}

# Redirect any plaintext to HTTPS (defense in depth; edge already forces TLS).
server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$host$request_uri;
}
